<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>User Registration</title>
    <style>
        body { font-family: Arial; background-color: #f4f4f4; text-align: center; }
        .form-container { background: white; width: 300px; margin: 50px auto; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px #ccc; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { background-color: #28a745; color: white; padding: 10px; width: 100%; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Register</h2>
        <form th:action="@{/saveUser}" th:object="${user}" method="post">
            <input type="text" th:field="*{name}" placeholder="Full Name" required />
            <input type="email" th:field="*{email}" placeholder="Email Address" required />
            <input type="password" th:field="*{password}" placeholder="Password" required />
<button type="submit" th:text="${user.id != null ? 'Update User' : 'Create Account'}"></button>        </form>
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
</body>
</html>
