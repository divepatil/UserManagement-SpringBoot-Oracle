<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; background-color: #f4f4f4; text-align: center; }
        .form-container { background: white; width: 300px; margin: 50px auto; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px #ccc; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { background-color: #007bff; color: white; padding: 10px; width: 100%; border: none; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Login</h2>
        <p class="error" th:if="${error}" th:text="${error}"></p>
        <form th:action="@{/loginUser}" method="post">
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>
        <p>New user? <a href="/register">Register here</a></p>
    </div>
</body>
</html>
