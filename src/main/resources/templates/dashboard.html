<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>User Dashboard</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn-delete { color: white; background-color: #dc3545; padding: 5px 10px; text-decoration: none; border-radius: 4px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logout { color: #dc3545; text-decoration: none; font-weight: bold; }
        .btn-edit { color: white; background-color: #007bff; padding: 5px 10px; text-decoration: none; border-radius: 4px; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>User Dashboard</h1>
        <a href="/login" class="logout">Logout</a>
    </div>
    
    <p>Welcome! Here is the list of registered users in your <b>Oracle Database</b>:</p>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
<tbody>
    <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.name}"></td>
        <td th:text="${u.email}"></td>
        <td>
            <!-- Edit Button (Blue) -->
            <a th:href="@{/edit/{id}(id=${u.id})}" class="btn-edit">Edit</a>
            
            <!-- Delete Button (Red) -->
            <a th:href="@{/delete/{id}(id=${u.id})}" class="btn-delete" 
               onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
        </td>
    </tr>
</tbody>

    </table>
</body>
</html>
